<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
  
    <section class="hero has-bg-image" aria-label="home" style="background-image: url('../img/herobg.jpg')">
        <div class="container">

          <div class="hero-content">

            <h1 class="section-text"> LA MEJOR OPCIÓN PARA TU PROXIMO VIAJE

            </h1>

            <a href="Interfaces/Catalogo.html" class="btn">
              <span class="span"> La casa de la innovación</span>

              <span class="material-symbols-rounded">arrow_forward</span>
            </a>

          </div>

          <figure class="hero-banner" style="--width: 1228; --height: 789;">
            <img src="../img/herobanner.png" width="1228" height="789" alt="red motor vehicle" class="move-anim">
          </figure>

        </div>
      </section>
      <script>
  document.addEventListener("DOMContentLoaded", () => {
    const btn = document.querySelector(".nav-toggle-btn");
    const navbar = document.querySelector(".navbar");
    const overlay = document.querySelector(".overlay");

    if (btn) {
      btn.addEventListener("click", () => {
        navbar.classList.toggle("active");
        btn.classList.toggle("active");
        overlay.classList.toggle("active");
      });
    }

    if (overlay) {
      overlay.addEventListener("click", () => {
        navbar.classList.remove("active");
        btn.classList.remove("active");
        overlay.classList.remove("active");
      });
    }
  });
</script>
</body>
</html>
