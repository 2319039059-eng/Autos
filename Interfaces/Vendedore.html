<!DOCTYPE html>
<html>
<head>
    <title>CRUD Vendedores</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">CRUD VENDEDORES</h2>

<input id="buscar" class="form-control mb-3" placeholder="Buscar..." onkeyup="buscarVendedores()">

<input type="hidden" id="idVendedor">

<input id="nombre" class="form-control mb-2" placeholder="Nombre">
<input id="ap" class="form-control mb-2" placeholder="Apellido Paterno">
<input id="am" class="form-control mb-2" placeholder="Apellido Materno">
<input id="correo" class="form-control mb-2" placeholder="Correo">
<input id="pass" type="password" class="form-control mb-2" placeholder="Contraseña">

<button onclick="guardar()" class="btn btn-success mb-3 w-100">Guardar</button>

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>ID</th><th>Nombre</th><th>Paterno</th><th>Correo</th><th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

const URL="http://localhost:8084/api/vendedores";

function listar(){
fetch(URL).then(r=>r.json()).then(mostrar);
}

function mostrar(data){
tabla.innerHTML="";
data.forEach(v=>{
tabla.innerHTML+=`
<tr>
<td>${v.idVendedor}</td>
<td>${v.nombre}</td>
<td>${v.aPaterno}</td>
<td>${v.correo}</td>
<td>
<button class="btn btn-warning btn-sm" onclick="editar(${v.idVendedor},'${v.nombre}','${v.aPaterno}','${v.aMaterno}','${v.correo}')">Editar</button>
<button class="btn btn-danger btn-sm" onclick="eliminar(${v.idVendedor})">Eliminar</button>
</td>
</tr>`;
});
}

function guardar(){
let id=idVendedor.value;

let obj={
nombre:nombre.value,
aPaterno:ap.value,
aMaterno:am.value,
correo:correo.value,
contrasena:pass.value
};

fetch(id?URL+"/"+id:URL,{
method:id?"PUT":"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(obj)
}).then(()=>{listar(); limpiar();});
}

function editar(id,n,apv,amv,c){
idVendedor.value=id;
nombre.value=n;
ap.value=apv;
am.value=amv;
correo.value=c;
}

function eliminar(id){
fetch(URL+"/"+id,{method:"DELETE"}).then(listar);
}

function buscarVendedores(){
let t=buscar.value.toLowerCase();
fetch(URL).then(r=>r.json()).then(d=>{
mostrar(d.filter(v=>v.nombre.toLowerCase().includes(t)));
});
}

function limpiar(){
idVendedor.value="";
nombre.value="";
ap.value="";
am.value="";
correo.value="";
pass.value="";
}

listar();

</script>

</body>
</html>
