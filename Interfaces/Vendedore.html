<!DOCTYPE html>
<html>
<head>
    <!--  Título -->
    <title>CRUD Vendedores</title>

    <!--  Icono -->
    <link rel="shortcut icon" href="../img/Favicon.jpg">

    <meta charset="UTF-8">

    <!--  Estilos -->
    <link rel="stylesheet" href="../css/panel.css">
</head>

<body>

<div class="container">

    <!-- Título principal -->
    <h2>CRUD VENDEDORES</h2>

    <!--  Botón para regresar al menú -->
    <button class="btn-back" onclick="window.location.href='menu.html'">
        ←
    </button>

    <!--  Buscador -->
    <input id="buscar" placeholder="Buscar..." onkeyup="buscarVendedores()">

    <!--  ID oculto (sirve para editar) -->
    <input type="hidden" id="idVendedor">

    <!--  Campos del formulario -->
    <input id="nombre" placeholder="Nombre">
    <input id="ap" placeholder="Apellido Paterno">
    <input id="am" placeholder="Apellido Materno">
    <input id="correo" placeholder="Correo">
    <input id="pass" type="password" placeholder="Contraseña">

    <!--  Botón guardar -->
    <button onclick="guardar()" class="btn-success">Guardar</button>

    <!-- =========================
          TABLA
    ========================= -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Paterno</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <!--  Aquí se cargan los datos -->
        <tbody id="tabla"></tbody>
    </table>

</div>

<!-- =========================
      MODAL PERSONALIZADO
========================= -->
<div id="modal" class="modal-custom">
    <div class="modal-content-custom">

        <!--  Mensaje -->
        <p id="modal-text">Mensaje</p>

        <!--  Botones -->
        <div class="modal-buttons">
            <button class="btn-success" onclick="confirmar()">Aceptar</button>
            <button class="btn-danger" onclick="cerrarModal()">Cancelar</button>
        </div>

    </div>
</div>

<script>

//  URL del backend
const API="http://localhost:8084/vendedores";

//  Guarda acciones (como eliminar)
let accionConfirmada = null;

/* =========================
    MODAL
========================= */

// Mostrar mensaje en pantalla
function mostrarModal(mensaje, callback){
    document.getElementById("modal-text").innerText = mensaje;
    document.getElementById("modal").classList.add("active");
    accionConfirmada = callback;
}

// Cerrar modal
function cerrarModal(){
    document.getElementById("modal").classList.remove("active");
}

// Ejecutar acción confirmada
function confirmar(){
    if(accionConfirmada) accionConfirmada();
    cerrarModal();
}

/* =========================
    LISTAR
========================= */

//  Obtiene todos los vendedores
function listar(){
fetch(API).then(r=>r.json()).then(mostrar);
}

/* =========================
    MOSTRAR
========================= */

//  Llena la tabla con datos
function mostrar(data){
tabla.innerHTML="";

data.forEach(v=>{
tabla.innerHTML+=`
<tr>
<td>${v.idVendedor}</td>
<td>${v.nombre}</td>
<td>${v.aPaterno}</td>
<td>${v.correo}</td>

<td>
<!--  Editar -->
<button class="btn-warning" onclick="editar(${v.idVendedor},'${v.nombre}','${v.aPaterno}','${v.aMaterno}','${v.correo}','${v.contrasena}')">Editar</button>

<!--  Eliminar -->
<button class="btn-danger" onclick="eliminar(${v.idVendedor})">Eliminar</button>
</td>
</tr>`;
});
}

/* =========================
    GUARDAR / EDITAR
======================== */

function guardar(){

// Si hay ID → editar, si no → crear nuevo
let id=idVendedor.value;

//  Objeto a enviar
let obj={
nombre:nombre.value,
aPaterno:ap.value,
aMaterno:am.value,
correo:correo.value,
contrasena:pass.value,

//  Tipo de usuario fijo (vendedor)
idTipoUsuario:1
};

//  Petición al backend
fetch(id?API+"/"+id:API,{
method:id?"PUT":"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(obj)
})

.then(()=>{
    mostrarModal(" Guardado correctamente", null);
    listar();
    limpiar();
});
}

/* =========================
    EDITAR
========================= */

//  Carga datos en el formulario
function editar(id,n,apv,amv,c,p){
idVendedor.value=id;
nombre.value=n;
ap.value=apv;
am.value=amv;
correo.value=c;
pass.value=p;
}

/* =========================
    ELIMINAR
========================= */

//  Elimina con confirmación
function eliminar(id){
    mostrarModal(" ¿Eliminar este registro?", () => {

        fetch(API+"/"+id,{method:"DELETE"})
        .then(()=>{
            mostrarModal(" Registro eliminado correctamente", null);
            listar();
        });
    });
}

/* =========================
    BUSCAR
========================= */

//  Filtra por nombre
function buscarVendedores(){
let t=buscar.value.toLowerCase();

fetch(API).then(r=>r.json()).then(d=>{
mostrar(d.filter(v=>v.nombre.toLowerCase().includes(t)));
});
}

/* =========================
    LIMPIAR
========================= */

//  Limpia formulario
function limpiar(){
idVendedor.value="";
nombre.value="";
ap.value="";
am.value="";
correo.value="";
pass.value="";
}

/* =========================
    INICIO
========================= */

//  Carga datos al abrir página
listar();

</script>

</body>
</html>
