<!DOCTYPE html>
<html>
<head>
    <title>Lista de Profesores</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Profesores - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: 50px; }
    </style>
</head>
<body>
     <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
            <div class="container">
                <a class="navbar-brand" href="#">Sistema Académico</a>
            </div>
        </nav>
    </header>
    <main class="container my-5">
        <div class="table-container shadow-sm">
            <h2 class="text-center text-primary mb-4">Panel de Gestión de Profesores</h2>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Sueldo</th>
                            <th>Tipo de Profesor</th>
                            <th class="text-center" colspan="2">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 - Gestión de Profesores | Spring Boot API</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        fetch('http://localhost:8084/api/profesor/consultar')
        .then(response => response.json())
        .then(data => {
            let tablaCuerpo = document.getElementById('tablaCuerpo');
            tablaCuerpo.innerHTML='';
            data.forEach(profesor => {
                let fila =document.createElement('tr');
                fila.innerHTML=`
                 <td>${profesor.nombre} </td>
                 <td>${profesor.sueldo} </td>
                 <td>${profesor.tipoDocente} </td>
                 <td class="text-center">
                    <button class="btn btn-warning-sm" onclick="">Actualizar</button>
                    <button class="btn btn-danger-sm" onclick="eliminarProfesor(${profesor.id})">Eliminar</button>
                 </td>

                `;
                tablaCuerpo.appendChild(fila);


            });

            
        })
        .catch(error=> console.error('error al cargar los datos.',error));

        //funcion para eliminar 
        function eliminarProfesor(id){
            if(confirm('¿desea eliminar este profesor?')){
                fetch(`http://localhost:8084/api/profesor/borrar/${id}`,{method:'DELETE'})
                .then(response=> response.text())
                .then(res=> {
                    alert(res);
                    location.reload();
                })
                

            }

        }
    </script>
</body>
</html>
