<!DOCTYPE html>
<html>
<head>
    <title>Lista de Clientes</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: 50px; }
    </style>
</head>

<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="#">Sistema de Clientes</a>
        </div>
    </nav>
</header>

<main class="container my-5">
    <div class="table-container shadow-sm">
        <h2 class="text-center text-primary mb-4">Panel de Gestión de Clientes</h2>

        <div class="mb-3">
            <button class="btn btn-success" onclick="nuevoCliente()">Nuevo Cliente</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Nombre</th>
                        <th>Apellido Paterno</th>
                        <th>Apellido Materno</th>
                        <th>Correo</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </div>
</main>

<footer class="text-center">
    <div class="container">
        <p class="mb-0">&copy; 2026 - Gestión de Clientes | Spring Boot API</p>
    </div>
</footer>

<script>

const URL = "http://localhost:8084/api/crudAutoselecttt";

function listarClientes(){
    fetch(URL)
    .then(response => {
        if(!response.ok) throw new Error();
        return response.json();
    })
    .then(data => {

        let tablaCuerpo = document.getElementById('tablaCuerpo');
        tablaCuerpo.innerHTML = '';

        if(data.length === 0){
            tablaCuerpo.innerHTML = `
                <tr>
                    <td colspan="5" class="text-center">No hay clientes registrados</td>
                </tr>
            `;
            return;
        }

        data.forEach(cliente => {

            let fila = document.createElement('tr');

            fila.innerHTML = `
                <td>${cliente.nombre}</td>
                <td>${cliente.aPaterno}</td>
                <td>${cliente.aMaterno}</td>
                <td>${cliente.correo}</td>
                <td class="text-center">
                    <button class="btn btn-warning btn-sm" onclick="editarCliente(${cliente.idCliente})">Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="eliminarCliente(${cliente.idCliente})">Eliminar</button>
                </td>
            `;

            tablaCuerpo.appendChild(fila);
        });
    })
    .catch(() => alert("No se pudo conectar con el servidor"));
}

function eliminarCliente(id){
    if(confirm('¿Deseas eliminar este cliente?')){
        fetch(`${URL}/${id}`, { method: 'DELETE' })
        .then(response => response.text())
        .then(() => listarClientes());
    }
}

function editarCliente(id){
    alert("Editar cliente ID: " + id);
}

function nuevoCliente(){
    alert("Crear nuevo cliente");
}

listarClientes();

</script>

</body>
</html>
