<!DOCTYPE html>
<html>
<head>
    <title>CRUD Clientes</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">CRUD CLIENTES</h2>

    <!-- 🔥 FORMULARIO -->
    <div class="card mb-4">
        <div class="card-body">

            <input type="hidden" id="idCliente">

            <input id="nombre" class="form-control mb-2" placeholder="Nombre">
            <input id="apaterno" class="form-control mb-2" placeholder="Apellido Paterno">
            <input id="amaterno" class="form-control mb-2" placeholder="Apellido Materno">
            <input id="correo" class="form-control mb-2" placeholder="Correo">
            <input id="contrasena" type="password" class="form-control mb-2" placeholder="Contraseña">

            <button class="btn btn-success w-100" onclick="guardarCliente()">Guardar</button>

        </div>
    </div>

    <div class="d-flex gap-2 mb-3">
        <button class="btn btn-primary" onclick="listarClientes()">Ver Clientes</button>
        <button class="btn btn-dark" onclick="verClientesVentas()">Ver Clientes con Ventas</button>
    </div>

    <!-- TABLA -->
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Paterno</th>
                <th>Materno</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaCuerpo"></tbody>
    </table>

</div>

<script>

const URL = "http://localhost:8084/api";
const URL_VENTAS = "http://localhost:8084/api/ventas";

// 🔥 LISTAR CLIENTES
function listarClientes(){
    fetch(URL)
    .then(res => res.json())
    .then(data => {

        let tabla = document.getElementById("tablaCuerpo");
        tabla.innerHTML = "";

        data.forEach(cliente => {

            tabla.innerHTML += `
                <tr>
                    <td>${cliente.idCliente}</td>
                    <td>${cliente.nombre}</td>
                    <td>${cliente.aPaterno}</td>
                    <td>${cliente.aMaterno}</td>
                    <td>${cliente.correo}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editarCliente(${cliente.idCliente}, '${cliente.nombre}', '${cliente.aPaterno}', '${cliente.aMaterno}', '${cliente.correo}')">
                            Editar
                        </button>

                        <button class="btn btn-danger btn-sm" onclick="eliminarCliente(${cliente.idCliente})">
                            Eliminar
                        </button>
                    </td>
                </tr>
            `;
        });

    });
}

// 🔥 GUARDAR / EDITAR
function guardarCliente(){

    let id = document.getElementById("idCliente").value;

    let cliente = {
        nombre: document.getElementById("nombre").value,
        aPaterno: document.getElementById("apaterno").value,
        aMaterno: document.getElementById("amaterno").value,
        correo: document.getElementById("correo").value,
        contrasena: document.getElementById("contrasena").value
    };

    if(id){
        fetch(`${URL}/${id}`, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(cliente)
        })
        .then(() => {
            alert("✏️ Cliente actualizado");
            limpiarFormulario();
            listarClientes();
        });

    } else {
        fetch(URL, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(cliente)
        })
        .then(() => {
            alert("✅ Cliente agregado");
            limpiarFormulario();
            listarClientes();
        });
    }
}

// 🔥 EDITAR
function editarCliente(id, nombre, ap, am, correo){

    document.getElementById("idCliente").value = id;
    document.getElementById("nombre").value = nombre;
    document.getElementById("apaterno").value = ap;
    document.getElementById("amaterno").value = am;
    document.getElementById("correo").value = correo;
}

// 🔥 ELIMINAR
function eliminarCliente(id){

    fetch(`${URL}/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        alert("🗑️ Eliminado");
        listarClientes();
    })
    .catch(() => alert("❌ Error al eliminar"));
}

// 🔥 LIMPIAR
function limpiarFormulario(){
    document.getElementById("idCliente").value = "";
    document.getElementById("nombre").value = "";
    document.getElementById("apaterno").value = "";
    document.getElementById("amaterno").value = "";
    document.getElementById("correo").value = "";
    document.getElementById("contrasena").value = "";
}

// 🔥 JOIN CLIENTES + VENTAS
function verClientesVentas(){
    fetch(`${URL_VENTAS}/clientes-ventas`)
    .then(res => res.json())
    .then(data => {

        let tabla = document.getElementById("tablaCuerpo");
        tabla.innerHTML = "";

        data.forEach(item => {

            tabla.innerHTML += `
                <tr>
                    <td>${item[0]}</td>
                    <td>${item[2]}</td>
                    <td>-</td>
                    <td>-</td>
                    <td>-</td>
                    <td>✔ Tiene venta</td>
                </tr>
            `;
        });

    })
    .catch(() => alert("❌ Error en JOIN"));
}

// 🔥 AUTO CARGA
listarClientes();

</script>

</body>
</html>
