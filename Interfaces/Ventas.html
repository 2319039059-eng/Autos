<!DOCTYPE html>
<html>
<head>
    <!--  Título -->
    <title>CRUD Ventas</title>

    <meta charset="UTF-8">

    <!--  Icono -->
    <link rel="shortcut icon" href="../img/Favicon.jpg">

    <!--  Estilos -->
    <link rel="stylesheet" href="../css/panel.css">
</head>

<body>

<div class="container">

    <!--  Título principal -->
    <h2>CRUD VENTAS</h2>

    <!--  Botón regresar -->
    <button class="btn-back" onclick="window.location.href='menu.html'">
        ←
    </button>

    <!--  Buscador -->
    <input id="buscar" placeholder="Buscar..." onkeyup="buscarVentas()">

    <!--  ID oculto -->
    <input type="hidden" id="idVenta">

    <!--  SELECTS (relaciones) -->
    <select id="auto"></select>
    <select id="cliente"></select>
    <select id="vendedor"></select>

    <!--  Fecha -->
    <input type="date" id="fecha">

    <!--  Total -->
    <input type="number" id="total" placeholder="Total">

    <!--  Guardar -->
    <button onclick="guardar()" class="btn-success">Guardar</button>

    <!-- =========================
          TABLA
    ========================= -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Auto</th>
                <th>Cliente</th>
                <th>Vendedor</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <!--  Datos dinámicos -->
        <tbody id="tabla"></tbody>
    </table>

</div>

<!-- =========================
      MODAL
========================= -->
<div id="modal" class="modal-custom">
    <div class="modal-content-custom">
        <p id="modal-text">Mensaje</p>
        <div class="modal-buttons">
            <button class="btn-success" onclick="confirmar()">Aceptar</button>
            <button class="btn-danger" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>

//  URL base backend
const API="http://localhost:8084";

//  Mapas para convertir IDs → nombres
let autosMap = {};
let clientesMap = {};
let vendedoresMap = {};

//  Guarda acción del modal
let accionConfirmada = null;

/* =========================
    MODAL
========================= */

// Mostrar mensaje
function mostrarModal(mensaje, callback){
    document.getElementById("modal-text").innerText = mensaje;
    document.getElementById("modal").classList.add("active");
    accionConfirmada = callback;
}

// Cerrar modal
function cerrarModal(){
    document.getElementById("modal").classList.remove("active");
}

// Confirmar acción
function confirmar(){
    if(accionConfirmada) accionConfirmada();
    cerrarModal();
}

/* =========================
    FECHA AUTOMÁTICA
========================= */

// Coloca la fecha actual
function fechaActual(){
    let hoy = new Date().toISOString().split("T")[0];
    fecha.value = hoy;
}

/* =========================
    CARGAR SELECTS
========================= */

function cargar(){

//  AUTOS
fetch(API+"/autos").then(r=>r.json()).then(d=>{
auto.innerHTML='<option value="">Auto</option>';
autosMap = {};

d.forEach(a=>{

    //  Guarda ID → nombre
    autosMap[a.idAuto] = a.marca;

    //  Solo permite seleccionar si hay stock
    if(a.stock > 0){
        auto.innerHTML+=`<option value="${a.idAuto}">
        ${a.marca} (${a.stock})
        </option>`;
    } else {
        auto.innerHTML+=`<option value="${a.idAuto}" disabled>
        ${a.marca} (SIN STOCK)
        </option>`;
    }
});
});

//  CLIENTES
fetch(API+"/api").then(r=>r.json()).then(d=>{
cliente.innerHTML='<option value="">Cliente</option>';
clientesMap = {};

d.forEach(c=>{
    clientesMap[c.idCliente] = c.nombre;

    cliente.innerHTML+=`<option value="${c.idCliente}">
    ${c.nombre}
    </option>`;
});
});

//  VENDEDORES
fetch(API+"/vendedores").then(r=>r.json()).then(d=>{
vendedor.innerHTML='<option value="">Vendedor</option>';
vendedoresMap = {};

d.forEach(v=>{
    vendedoresMap[v.idVendedor] = v.nombre;

    vendedor.innerHTML+=`<option value="${v.idVendedor}">
    ${v.nombre}
    </option>`;
});
});
}

/* =========================
    LISTAR
========================= */

// Obtiene ventas
function listar(){
fetch(API+"/api/ventas").then(r=>r.json()).then(mostrar);
}

/* =========================
    MOSTRAR
========================= */

function mostrar(data){
tabla.innerHTML="";

data.forEach(v=>{
tabla.innerHTML+=`
<tr>
<td>${v.idVenta}</td>

<!--  Aquí usa los mapas -->
<td>${autosMap[v.idAuto] || v.idAuto}</td>
<td>${clientesMap[v.idCliente] || v.idCliente}</td>
<td>${vendedoresMap[v.idVendedor] || v.idVendedor}</td>

<td>${v.fecha}</td>
<td>${v.total}</td>

<td>
<button class="btn-warning" onclick="editar(${v.idVenta},${v.idAuto},${v.idCliente},${v.idVendedor},'${v.fecha}',${v.total})">Editar</button>

<button class="btn-danger" onclick="eliminar(${v.idVenta})">Eliminar</button>
</td>
</tr>`;
});
}

/* =========================
    GUARDAR
========================= */

function guardar(){

//  Validación
if(!auto.value || !cliente.value || !vendedor.value){
    mostrarModal(" Completa todos los campos", null);
    return;
}

let id=idVenta.value;

//  Objeto
let obj={
idAuto: parseInt(auto.value),
idCliente: parseInt(cliente.value),
idVendedor: parseInt(vendedor.value),
fecha:fecha.value,
total:total.value
};

//  Petición
fetch(id?API+"/api/ventas/"+id:API+"/api/ventas",{
method:id?"PUT":"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(obj)
})

.then(res=>{
    if(!res.ok) throw new Error("Sin stock");
    return res.json();
})

.then(()=>{
    mostrarModal(" Venta realizada correctamente", null);
    listar();
    cargar(); //  Actualiza stock
    limpiar();
})

.catch(()=>{
    mostrarModal(" No hay stock disponible", null);
});
}

/* =========================
    EDITAR
========================= */

function editar(id,a,c,v,f,t){
idVenta.value=id;
auto.value=a;
cliente.value=c;
vendedor.value=v;
fecha.value=f;
total.value=t;
}

/* =========================
    ELIMINAR
========================= */

function eliminar(id){
mostrarModal(" ¿Eliminar esta venta?", () => {
    fetch(API+"/api/ventas/"+id,{method:"DELETE"})
    .then(()=>{
        mostrarModal(" Venta eliminada", null);
        listar();
        cargar();
    });
});
}

/* =========================
    BUSCAR
========================= */

function buscarVentas(){
let t=buscar.value.toLowerCase();

fetch(API+"/api/ventas").then(r=>r.json()).then(d=>{
mostrar(d.filter(v=>v.idVenta.toString().includes(t)));
});
}

/* =========================
    LIMPIAR
========================= */

function limpiar(){
idVenta.value="";
auto.value="";
cliente.value="";
vendedor.value="";
fechaActual();
total.value="";
}

/* =========================
    INICIO
========================= */

//  Ejecuta todo al abrir
fechaActual();
cargar();
listar();

</script>

</body>
</html>
