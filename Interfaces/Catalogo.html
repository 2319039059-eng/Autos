<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Vehículos Premium</title>

  <!-- CSS propio -->
  <link rel="stylesheet" href="../css/catalogo.css">

 <link rel="stylesheet" href="../css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="../img/herobanner.png">
  <link rel="preload" as="image" href="../img/herobg.jpg">

</head>

<body>

  <!-- ================= HEADER ================= -->
  <header>
    <div class="container">
      <nav>
        <div class="logo">
          <img class="logo"src="../img/logo1.png"/>

        </div>

        <div>
          <a href="/index.html" class="nav-link">INICIO</a>
          <a href="./Catalogo.html" class="nav-link">CATÁLOGO</a>
          <a href="../index/footer.html" class="nav-link">CONTACTO</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- ================= HERO ================= -->
  <section class="hero-bg">
    <div class="container hero-content">

     <div class="container hero-content">

  <div class="hero-text">
    <h1>
      ENCUENTRA TU <br>
      <span class="accent">VEHÍCULO IDEAL</span>
    </h1>

    <p style="margin-bottom:20px; font-size:20px;">
      Catálogo de Vehículos Premium
    </p>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Busca tu modelo favorito">
      <button>Buscar</button>
    </div>
  </div>

  <div class="hero-image">
    <img src="../img/herobanner.png" alt="Auto Premium">
  </div>

</div>
  </section>

  <!-- ================= CATALOGO ================= -->
  <section id="catalogo" class="catalogo">
    <div class="container">

      <h2 style="text-align:center; margin-bottom:50px;">
        Camionetas <span class="accent">Pickup</span>
      </h2>

     <div class="grid">

  <!-- Toyota Hilux -->
  <div class="card">
    <img src="../img/hilux.jpg" alt="Toyota Hilux">
    <div class="card-content">
      <div class="tag">Pickup</div>
      <h1>Tacoma</h1>
      <div class="price">Desde $850,000 M.N.</div>
      <div class="buttons">
        <button>Cotiza Ahora</button>
        <button>Explorar</button>
      </div>
    </div>
  </div>

  <!-- Ford Ranger -->
  <div class="card">
    <img src="../img/ranger.jpg" alt="Ford Ranger">
    <div class="card-content">
      <div class="tag">Pickup</div>
      <h1>Ford Ranger</h1>
      <div class="price">Desde $790,000 M.N.</div>
      <div class="buttons">
        <button>COTIZA AHORA</button>
      </div>
    </div>
  </div>

  <!-- Chevrolet Colorado -->
  <div class="card">
    <img src="../img/colorado.jpg" alt="Chevrolet Colorado">
    <div class="card-content">
      <div class="tag">Pickup</div>
      <h1>Chevrolet Colorado</h1>
      <div class="price">Desde $810,000 M.N.</div>
      <div class="buttons">
        <button>COTIZA AHORA</button>
      </div>
    </div>
  </div>

</div>
    </div>
  </section>

  <!-- ================= FOOTER ================= -->
  <footer id="contacto">
    <div class="container">
      <p>© 2024 AutoSelect. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- JS propio -->
  <script src="../JS/scriptCata.js"></script>

</body>
</html>
