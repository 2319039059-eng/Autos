<!DOCTYPE html>
<html>
<head>
    <title>CRUD Autos</title>

    <!--  Icono de la pestaña -->
    <link rel="shortcut icon" href="../img/Favicon.jpg">

    <meta charset="UTF-8">

    <!-- Tu hoja de estilos personalizada -->
    <link rel="stylesheet" href="../css/panel.css">
</head>

<body>

<div class="container">

    <!--  Título -->
    <h2>CRUD AUTOS</h2>

    <!--  Botón para regresar al menú -->
    <button class="btn-back" onclick="window.location.href='menu.html'">
        ←
    </button>

    <!--  Buscador en tiempo real -->
    <input id="buscar" placeholder="Buscar..." onkeyup="buscarAutos()">

    <!--  Campo oculto para guardar el ID cuando editas -->
    <input type="hidden" id="idAuto">

    <!--  Campos del formulario -->
    <input id="marca" placeholder="Marca">
    <input id="modelo" placeholder="Modelo">
    <input id="color" placeholder="Color">
    <input id="stock" type="number" placeholder="Stock">

    <!-- 💾 Botón guardar -->
    <button onclick="guardar()" class="btn-success">Guardar</button>

    <!--  Tabla de autos -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Color</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <!--  Aquí se cargan los datos dinámicamente -->
        <tbody id="tabla"></tbody>
    </table>

</div>

<!-- =========================
      MODAL PERSONALIZADO
========================= -->
<div id="modal" class="modal-custom">
    <div class="modal-content-custom">

        <!--  Texto del mensaje -->
        <p id="modal-text">Mensaje</p>

        <!--  Botones del modal -->
        <div class="modal-buttons">
            <button class="btn-success" onclick="confirmar()">Aceptar</button>
            <button class="btn-danger" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>

//  URL de tu API backend
const API="http://localhost:8084/autos";

//  Guarda la acción que se ejecutará al confirmar (ej: eliminar)
let accionConfirmada = null;

/* =========================
    FUNCIONES DEL MODAL
========================= */

//  Muestra el modal con mensaje
function mostrarModal(mensaje, callback){
    document.getElementById("modal-text").innerText = mensaje; // Texto
    document.getElementById("modal").classList.add("active"); // Mostrar modal
    accionConfirmada = callback; // Guarda la acción a ejecutar
}

//  Cierra el modal
function cerrarModal(){
    document.getElementById("modal").classList.remove("active");
}

//  Ejecuta la acción confirmada
function confirmar(){
    if(accionConfirmada) accionConfirmada(); // Ejecuta función guardada
    cerrarModal(); // Cierra modal
}

/* =========================
    FUNCIONES CRUD
========================= */

//  LISTAR AUTOS
function listar(){
    fetch(API) // Hace petición GET
    .then(r=>r.json()) // Convierte a JSON
    .then(mostrar); // Manda datos a función mostrar
}

//  MOSTRAR DATOS EN TABLA
function mostrar(data){
    tabla.innerHTML=""; // Limpia tabla

    data.forEach(a=>{
        tabla.innerHTML+=`
        <tr>
            <td>${a.idAuto}</td>
            <td>${a.marca}</td>
            <td>${a.modelo}</td>
            <td>${a.color}</td>
            <td>${a.stock}</td>
            <td>
                <!--  BOTÓN EDITAR -->
                <button class="btn-warning" 
                onclick="editar(${a.idAuto},'${a.marca}','${a.modelo}','${a.color}',${a.stock})">
                Editar</button>

                <!--  BOTÓN ELIMINAR -->
                <button class="btn-danger" onclick="eliminar(${a.idAuto})">
                Eliminar</button>
            </td>
        </tr>`;
    });
}

//  GUARDAR O EDITAR
function guardar(){

    let id=idAuto.value; // Si tiene ID → editar

    //  Objeto que se enviará al backend
    let obj={
        marca:marca.value,
        modelo:modelo.value,
        color:color.value,
        stock:stock.value,
        idProveedor:1,
        rutaImagen:""
    };

    //  Si hay ID → PUT, si no → POST
    fetch(id?API+"/"+id:API,{
        method:id?"PUT":"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(obj)
    })
    .then(()=>{
        mostrarModal("✅ Guardado correctamente", null); // Mensaje
        listar(); // Actualiza tabla
        limpiar(); // Limpia formulario
    });
}

// CARGAR DATOS PARA EDITAR
function editar(id,m,mo,c,s){
    idAuto.value=id;
    marca.value=m;
    modelo.value=mo;
    color.value=c;
    stock.value=s;
}

//  ELIMINAR CON CONFIRMACIÓN
function eliminar(id){
    mostrarModal("⚠️ ¿Eliminar este registro?", () => {
        fetch(API+"/"+id,{method:"DELETE"})
        .then(()=>{
            mostrarModal("✅ Eliminado correctamente", null);
            listar();
        });
    });
}

//  BUSCAR EN TIEMPO REAL
function buscarAutos(){
    let t=buscar.value.toLowerCase();

    fetch(API).then(r=>r.json()).then(d=>{
        mostrar(
            d.filter(a=>a.marca.toLowerCase().includes(t))
        );
    });
}

//  LIMPIAR FORMULARIO
function limpiar(){
    idAuto.value="";
    marca.value="";
    modelo.value="";
    color.value="";
    stock.value="";
}

//  INICIO AUTOMÁTICO
listar();

</script>

</body>
</html>
