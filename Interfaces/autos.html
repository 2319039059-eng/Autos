<!DOCTYPE html>
<html>
<head>
    <title>CRUD Autos</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-5">

<h2 class="text-center">CRUD AUTOS</h2>

<input id="buscar" class="form-control mb-3" placeholder="Buscar..." onkeyup="buscarAutos()">

<input type="hidden" id="idAuto">

<input id="marca" class="form-control mb-2" placeholder="Marca">
<input id="modelo" class="form-control mb-2" placeholder="Modelo">
<input id="color" class="form-control mb-2" placeholder="Color">

<button onclick="guardar()" class="btn btn-success mb-3">Guardar</button>

<table class="table">
<thead class="table-dark">
<tr><th>ID</th><th>Marca</th><th>Modelo</th><th>Color</th><th>Acciones</th></tr>
</thead>
<tbody id="tabla"></tbody>
</table>

</div>

<script>

const URL="http://localhost:8084/api/autos";

function listar(){
fetch(URL).then(r=>r.json()).then(mostrar);
}

function mostrar(data){
tabla.innerHTML="";
data.forEach(a=>{
tabla.innerHTML+=`
<tr>
<td>${a.idAuto}</td>
<td>${a.marca}</td>
<td>${a.modelo}</td>
<td>${a.color}</td>
<td>
<button onclick="editar(${a.idAuto},'${a.marca}','${a.modelo}','${a.color}')" class="btn btn-warning btn-sm">Editar</button>
<button onclick="eliminar(${a.idAuto})" class="btn btn-danger btn-sm">Eliminar</button>
</td>
</tr>`;
});
}

function guardar(){
let id=idAuto.value;

let obj={
marca:marca.value,
modelo:modelo.value,
color:color.value
};

fetch(id?URL+"/"+id:URL,{
method:id?"PUT":"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(obj)
}).then(()=>{listar(); limpiar();});
}

function editar(id,m,mo,c){
idAuto.value=id;
marca.value=m;
modelo.value=mo;
color.value=c;
}

function eliminar(id){
fetch(URL+"/"+id,{method:"DELETE"}).then(listar);
}

function buscarAutos(){
let t=buscar.value.toLowerCase();
fetch(URL).then(r=>r.json()).then(d=>{
mostrar(d.filter(a=>a.marca.toLowerCase().includes(t)));
});
}

function limpiar(){
idAuto.value="";
marca.value="";
modelo.value="";
color.value="";
}

listar();

</script>
</body>
</html>
