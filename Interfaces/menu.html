<!DOCTYPE html>
<html>
<head>
    <title>Menú Sistema</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5 text-center">

    <h1 class="mb-4">🚗 Sistema Autoselect</h1>
    <p>Selecciona qué deseas visualizar</p>

    <div class="row mt-4">

        <div class="col-md-4 mb-3">
            <button class="btn btn-primary w-100" onclick="window.location.href='clientes.html'">👤 Clientes</button>
        </div>

        <div class="col-md-4 mb-3">
            <button class="btn btn-success w-100" onclick="window.location.href='autos.html'">🚗 Autos</button>
        </div>

        <div class="col-md-4 mb-3">
            <button class="btn btn-warning w-100" onclick="window.location.href='vendedore.html'">👨‍💼 Vendedores</button>
        </div>

        <div class="col-md-4 mb-3">
            <button class="btn btn-info w-100" onclick="window.location.href='ventas.html'">💰 Ventas</button>
        </div>

        <div class="col-md-4 mb-3">
            <button class="btn btn-danger w-100" onclick="verRelacion()">🔗 Relación</button>
        </div>

    </div>

    <!-- TABLA RELACIÓN -->
    <div class="mt-5 bg-white text-dark p-3 rounded shadow">
        <table class="table table-bordered table-hover">
            <thead class="table-dark" id="tablaHead"></thead>
            <tbody id="tablaBody"></tbody>
        </table>
    </div>

</div>

<script>

const API = "http://localhost:8084";

// 🔥 RELACIÓN (JOIN)
function verRelacion(){
    fetch(API + "/api/ventas/clientes-ventas")
    .then(res => res.json())
    .then(data => {

        document.getElementById("tablaHead").innerHTML = `
            <tr>
                <th>Cliente</th>
                <th>Vendedor</th>
                <th>Auto</th>
                <th>Total</th>
                <th>Fecha</th>
            </tr>
        `;

        let body = document.getElementById("tablaBody");
        body.innerHTML = "";

        data.forEach(r => {
            body.innerHTML += `
                <tr>
                    <td>${r[0]}</td>
                    <td>${r[1]}</td>
                    <td>${r[2]}</td>
                    <td>${r[3]}</td>
                    <td>${r[4]}</td>
                </tr>
            `;
        });
    })
    .catch(() => alert("❌ Error al cargar relación"));
}

</script>

</body>
</html>
