<!DOCTYPE html>
<html>
<head>
    <title>Menú Sistema</title>

    <!--  Icono de la pestaña -->
    <link rel="shortcut icon" href="../img/Favicon.jpg">

    <meta charset="UTF-8">

    <!--  Hoja de estilos personalizada -->
    <link rel="stylesheet" href="../css/panel.css">
</head>

<body>

<div class="container">

    <!--  Título principal -->
    <h1>🚗 Sistema Autoselect</h1>

    <!--  Botón para regresar (por ejemplo al login) -->
    <button class="btn-back" onclick="window.location.href='formularioG.html'">
        ←
    </button>

    <!--  Descripción -->
    <p style="text-align:center;">Selecciona qué deseas visualizar</p>

    <!-- =========================
          MENÚ PRINCIPAL
    ========================= -->
    <div class="menu-container">

        <!--  Ir a CRUD CLIENTES -->
        <div class="menu-btn clientes" onclick="window.location.href='clientes.html'">
            👤 Clientes
        </div>

        <!--  Ir a CRUD AUTOS -->
        <div class="menu-btn autos" onclick="window.location.href='autos.html'">
            🚗 Autos
        </div>

        <!--  Ir a CRUD VENDEDORES -->
        <div class="menu-btn vendedores" onclick="window.location.href='vendedore.html'">
            👨‍💼 Vendedores
        </div>

        <!--  Ir a CRUD VENTAS -->
        <div class="menu-btn ventas" onclick="window.location.href='ventas.html'">
            💰 Ventas
        </div>

        <!-- 🔗 Mostrar relación (JOIN) -->
        <div class="menu-btn relacion" onclick="verRelacion()">
            🔗 Relación
        </div>

    </div>

    <!-- =========================
          TABLA DE RELACIÓN
    ========================= -->
    <div class="card">
        <table>

            <!--  Encabezado dinámico -->
            <thead id="tablaHead"></thead>

            <!--  Datos dinámicos -->
            <tbody id="tablaBody"></tbody>

        </table>
    </div>

</div>

<!-- =========================
      MODAL PERSONALIZADO
========================= -->
<div id="modal" class="modal-custom">
    <div class="modal-content-custom">

        <!--  Texto del mensaje -->
        <p id="modal-text">Mensaje</p>

        <!--  Botones -->
        <div class="modal-buttons">
            <button class="btn-success" onclick="confirmar()">Aceptar</button>
            <button class="btn-danger" onclick="cerrarModal()">Cerrar</button>
        </div>

    </div>
</div>

<script>

//  URL base de tu backend
const API = "http://localhost:8084";

//  Guarda la acción a ejecutar al confirmar
let accionConfirmada = null;

/* =========================
    FUNCIONES DEL MODAL
========================= */

//  Muestra el modal con mensaje
function mostrarModal(mensaje, callback){
    document.getElementById("modal-text").innerText = mensaje; // Texto
    document.getElementById("modal").classList.add("active"); // Mostrar modal
    accionConfirmada = callback; // Guarda función opcional
}

//  Cerrar modal
function cerrarModal(){
    document.getElementById("modal").classList.remove("active");
}

//  Confirmar acción (si existe)
function confirmar(){
    if(accionConfirmada) accionConfirmada(); // Ejecuta acción
    cerrarModal(); // Cierra modal
}

/* =========================
    RELACIÓN (JOIN)
========================= */

//  Consulta relación entre Cliente, Vendedor, Auto y Venta
function verRelacion(){

    //  Llama al backend
    fetch(API + "/api/ventas/clientes-ventas")
    .then(res => res.json()) // Convierte respuesta a JSON

    .then(data => {

        //  Crea encabezado de la tabla
        document.getElementById("tablaHead").innerHTML = `
            <tr>
                <th>Cliente</th>
                <th>Vendedor</th>
                <th>Auto</th>
                <th>Total</th>
                <th>Fecha</th>
            </tr>
        `;

        //  Referencia al cuerpo de la tabla
        let body = document.getElementById("tablaBody");
        body.innerHTML = ""; // Limpia tabla

        //  Recorre los datos
        data.forEach(r => {
            body.innerHTML += `
                <tr>
                    <td>${r[0]}</td> <!-- Cliente -->
                    <td>${r[1]}</td> <!-- Vendedor -->
                    <td>${r[2]}</td> <!-- Auto -->
                    <td>${r[3]}</td> <!-- Total -->
                    <td>${r[4]}</td> <!-- Fecha -->
                </tr>
            `;
        });

        //  Mensaje de éxito
        mostrarModal("✅ Relación cargada correctamente", null);
    })

    .catch(() => {
        // ❌ Mensaje de error si falla
        mostrarModal("❌ Error al cargar relación", null);
    });
}

</script>

</body>
</html>
