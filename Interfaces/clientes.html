<!DOCTYPE html>
<html>
<head>
    <!--  Título de la pestaña -->
    <title>CRUD Clientes</title>

    <!--  Icono -->
    <link rel="shortcut icon" href="../img/Favicon.jpg">

    <meta charset="UTF-8">

    <!--  Estilos -->
    <link rel="stylesheet" href="../css/panel.css">
</head>

<body>

<div class="container">

    <!--  Título principal -->
    <h2>CRUD CLIENTES</h2>

    <!--  Botón regresar al menú -->
    <button class="btn-back" onclick="window.location.href='menu.html'">
        ←
    </button>

    <!--  Buscador -->
    <input id="buscar" placeholder="Buscar..." onkeyup="buscarClientes()">

    <!-- =========================
          FORMULARIO
    ========================= -->
    <div class="card">

        <!--  ID oculto (para editar) -->
        <input type="hidden" id="idCliente">

        <!--  Campos -->
        <input id="nombre" placeholder="Nombre">
        <input id="apaterno" placeholder="Apellido Paterno">
        <input id="amaterno" placeholder="Apellido Materno">
        <input id="correo" placeholder="Correo">
        <input id="contrasena" type="password" placeholder="Contraseña">

        <!--  Botón guardar -->
        <button class="btn-success" onclick="guardarCliente()">Guardar</button>

    </div>

    <!-- =========================
          TABLA
    ========================= -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Paterno</th>
                <th>Materno</th>
                <th>Correo</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <!--  Aquí se insertan los datos dinámicamente -->
        <tbody id="tabla"></tbody>
    </table>

</div>

<!-- =========================
      MODAL PERSONALIZADO
========================= -->
<div id="modal" class="modal-custom">
    <div class="modal-content-custom">

        <!--  Mensaje -->
        <p id="modal-text">Mensaje</p>

        <!--  Botones -->
        <div class="modal-buttons">
            <button class="btn-success" onclick="confirmar()">Aceptar</button>
            <button class="btn-danger" onclick="cerrarModal()">Cancelar</button>
        </div>

    </div>
</div>

<script>

//  URL del backend
const URL = "http://localhost:8084/api";

//  Guarda la acción a ejecutar (ej: eliminar)
let accionConfirmada = null;

/* =========================
    FUNCIONES MODAL
========================= */

//  Muestra mensaje
function mostrarModal(mensaje, callback){
    document.getElementById("modal-text").innerText = mensaje;
    document.getElementById("modal").classList.add("active");
    accionConfirmada = callback;
}

//  Cerrar modal
function cerrarModal(){
    document.getElementById("modal").classList.remove("active");
}

//  Confirmar acción
function confirmar(){
    if(accionConfirmada) accionConfirmada();
    cerrarModal();
}

/* =========================
    LISTAR CLIENTES
========================= */

//  Obtiene todos los clientes
function listarClientes(){
    fetch(URL)
    .then(res => res.json())
    .then(data => mostrar(data));
}

/* =========================
    MOSTRAR DATOS
========================= */

//  Llena la tabla
function mostrar(data){
    tabla.innerHTML = ""; // limpia tabla

    data.forEach(c=>{

        tabla.innerHTML += `
        <tr>
            <td>${c.idCliente}</td>
            <td>${c.nombre}</td>
            <td>${c.aPaterno}</td>
            <td>${c.aMaterno}</td>
            <td>${c.correo}</td>
            <td>
                <!--  Editar -->
                <button class="btn-warning" onclick="editar(${c.idCliente},'${c.nombre}','${c.aPaterno}','${c.aMaterno}','${c.correo}')">Editar</button>

                <!--  Eliminar -->
                <button class="btn-danger" onclick="eliminar(${c.idCliente})">Eliminar</button>
            </td>
        </tr>`;
    });
}

/* =========================
    GUARDAR / EDITAR
========================= */

function guardarCliente(){

    // 🆔 Si hay ID → editar, si no → nuevo
    let id = idCliente.value;

    // 📦 Objeto a enviar al backend
    let obj = {
        nombre:nombre.value,
        aPaterno:apaterno.value,
        aMaterno:amaterno.value,
        correo:correo.value,
        contrasena:contrasena.value
    };

    //  Define método y URL
    let metodo = id ? "PUT" : "POST";
    let url = id ? URL+"/"+id : URL;

    //  Petición
    fetch(url,{
        method:metodo,
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(obj)
    })

    .then(()=>{
        mostrarModal("✅ Guardado correctamente", null);
        listarClientes();
        limpiar();
    });
}

/* =========================
    EDITAR
========================= */

function editar(id,n,ap,am,c){
    idCliente.value=id;
    nombre.value=n;
    apaterno.value=ap;
    amaterno.value=am;
    correo.value=c;
}

/* =========================
    ELIMINAR
========================= */

function eliminar(id){

    //  Modal de confirmación
    mostrarModal(" ¿Eliminar este cliente?", () => {

        fetch(URL+"/"+id,{method:"DELETE"})
        .then(()=>{
            mostrarModal(" Cliente eliminado correctamente", null);
            listarClientes();
        });
    });
}

/* =========================
    BUSCAR
========================= */

function buscarClientes(){

    let txt = buscar.value.toLowerCase();

    fetch(URL)
    .then(res=>res.json())
    .then(data=>{
        mostrar(data.filter(c=>c.nombre.toLowerCase().includes(txt)));
    });
}

/* =========================
   LIMPIAR FORM
========================= */

function limpiar(){
    idCliente.value="";
    nombre.value="";
    apaterno.value="";
    amaterno.value="";
    correo.value="";
    contrasena.value="";
}

/* =========================
    INICIO
========================= */

//  Carga datos al abrir la página
listarClientes();

</script>

</body>
</html>
